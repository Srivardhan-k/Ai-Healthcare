services:
  - type: web
    name: mediguard-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FRONTEND_URL
        value: "*" # Set this to your production frontend URL (e.g. https://my-frontend.vercel.app)
      - key: FLASK_ENV
        value: production
